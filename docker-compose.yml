services:
  postgres:
    image: postgres:16-alpine
    container_name: core-banking-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: core_banking_ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - core-banking-ledger-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d core_banking_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  core-banking-ledger-pgdata:
