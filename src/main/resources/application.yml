spring:
  application:
    name: core-banking-ledger
  profiles:
    active: dev

app:
  transaction:
    retry:
      max-attempts: 5
      initial-backoff: 50ms
      backoff-multiplier: 2.0

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/core_banking_ledger
    username: ledger
    password: ledger
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.eugeniokg.corebankingledger: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Note: datasource connection details for the "test" profile are provided
# dynamically at runtime by Testcontainers (see test support classes),
# so no fixed jdbc url/credentials are configured here.
